# See https://pre-commit.com for more information
# See https://github.com/TekWizely/pre-commit-golang for hook docs
repos:
  - repo: https://github.com/TekWizely/pre-commit-golang
    rev: v1.0.0-rc.4
    hooks:
      # --- Formatting ---
      - id: go-fmt-repo
        args: [-s, -w]

      - id: go-imports-repo
        args: [-w]

      # --- Correctness ---
      - id: go-vet-repo-mod

      - id: go-test-repo-mod

      - id: go-build-repo-mod

      - id: go-mod-tidy-repo

      # --- Security ---
      - id: go-sec-repo-mod
        args:
          - -exclude=G104,G304
          # G104: defer Close() errors are standard Go idiom
          # G304: loadDotEnv + taco data path are hardcoded

  # --- Frontend ---
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.39.1
    hooks:
      - id: eslint
        files: ^web/src/.*\.(ts|tsx)$
        types_or: [ts, tsx]
        args: [--config, web/eslint.config.js]

  - repo: local
    hooks:
      - id: tsc-check
        name: TypeScript type-check
        entry: bash -c 'cd web && npx tsc -b'
        language: system
        files: ^web/src/.*\.(ts|tsx)$
        pass_filenames: false
