sonar.projectKey=DietDaemon
sonar.projectName=DietDaemon
sonar.sourceEncoding=UTF-8

sonar.sources=.
sonar.exclusions=**/node_modules/**,web/dist/**,internal/web/dist/**,graphify-out/**

sonar.tests=.
sonar.test.inclusions=**/*_test.go,web/src/**/*.test.ts,web/src/**/*.test.tsx

sonar.go.coverage.reportPaths=coverage.out
sonar.javascript.lcov.reportPaths=web/coverage/lcov.info
