name: Docker

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (default: latest)'
        required: false
        default: 'latest'
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/gsaraiva2109/dietdaemon

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Build & Push Docker Image
    runs-on: [self-hosted, homelab, Linux, X64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          TAG="${{ inputs.tag }}"
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          if [ "$TAG" = "latest" ]; then
            echo "tags=${{ env.IMAGE_NAME }}:latest,${{ env.IMAGE_NAME }}:sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${{ env.IMAGE_NAME }}:${TAG},${{ env.IMAGE_NAME }}:sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  deploy:
    name: Notify Homelab Deploy
    runs-on: ubuntu-latest
    needs: [docker]
    if: always() && !cancelled()
    steps:
      - name: Image pushed
        if: needs.docker.result == 'success'
        run: |
          echo "Image pushed: ${{ env.IMAGE_NAME }}:${{ inputs.tag }}"
          echo "SHA: ${{ github.sha }}"

      - name: Notify failure
        if: needs.docker.result == 'failure'
        run: |
          curl -sf \
            -H "Title: DietDaemon Docker Build Failed" \
            -H "Priority: high" \
            -H "Tags: warning" \
            -d "Manual docker build failed. Tag: ${{ inputs.tag }} SHA: ${{ github.sha }}" \
            "${{ secrets.NTFY_DEPLOY_URL }}" \
          || true