name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  packages: write
  pull-requests: write

env:
  GO_VERSION: '1.26'
  NODE_VERSION: '22'
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/gsaraiva2109/dietdaemon

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Create or update release PR
        id: release
        uses: googleapis/release-please-action@v4.4.1
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  go:
    name: Go (build)
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Go
        uses: actions/setup-go@v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download dependencies
        run: go mod download

      - name: Stub web/dist for go:embed
        run: |
          mkdir -p internal/web/dist
          if [ ! -f internal/web/dist/index.html ]; then
            echo '<html></html>' > internal/web/dist/index.html
          fi

      - name: Build (dietdaemon)
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o /dev/null ./cmd/dietdaemon

      - name: Build (tune)
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o /dev/null ./cmd/tune

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload frontend dist (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist/
          retention-days: 1

  docker:
    name: Build & Push Docker Image (Release)
    runs-on: [self-hosted, homelab, linux, amd64]
    needs: [release-please, go, frontend]
    if: needs.release-please.outputs.release_created == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "version=${TAG#v}"           >> "$GITHUB_OUTPUT"  # 1.2.3
          TAGS="${{ env.IMAGE_NAME }}:${TAG},${{ env.IMAGE_NAME }}:sha-${SHORT_SHA}"
          if [[ ! "$TAG" =~ -(alpha|beta|rc) ]]; then
            TAGS+=",${{ env.IMAGE_NAME }}:latest"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  release:
    name: Upload Release Assets
    runs-on: ubuntu-latest
    needs: [release-please, docker, frontend]
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Go
        uses: actions/setup-go@v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download frontend dist
        uses: actions/download-artifact@v8.0.1
        with:
          name: web-dist
          path: web/dist/

      - name: Stage frontend for embed
        run: |
          rm -rf internal/web/dist
          mkdir -p internal/web/dist
          cp -r web/dist/. internal/web/dist/

      - name: Build static binaries
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/dietdaemon-linux-amd64 ./cmd/dietdaemon
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/tune-linux-amd64 ./cmd/tune
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/import-foods-linux-amd64 ./cmd/import-foods
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o dist/dietdaemon-linux-arm64 ./cmd/dietdaemon
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o dist/tune-linux-arm64 ./cmd/tune
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o dist/import-foods-linux-arm64 ./cmd/import-foods
          gzip -k dist/*-amd64 dist/*-arm64

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: gh release upload "$TAG" dist/*.gz --clobber
