name: Main

on:
  push:
    branches: [main]

concurrency:
  group: main
  cancel-in-progress: false

env:
  GO_VERSION: '1.26'
  NODE_VERSION: '22'
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/gsaraiva2109/dietdaemon

jobs:
  go:
    name: Go (lint, test, build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1 -timeout 120s

      - name: Stub web/dist for go:embed
        run: |
          mkdir -p internal/web/dist
          if [ ! -f internal/web/dist/index.html ]; then
            echo '<html></html>' > internal/web/dist/index.html
          fi

      - name: Build (dietdaemon)
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o /dev/null ./cmd/dietdaemon

      - name: Build (tune)
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o /dev/null ./cmd/tune

  frontend:
    name: Frontend (lint, tsc, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript check
        run: npx tsc -b --noEmit

      - name: Build
        run: npm run build

  docker:
    name: Build & Push Docker Image
    runs-on: [self-hosted, homelab, linux, amd64]
    needs: [go, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "tags=${{ env.IMAGE_NAME }}:latest,${{ env.IMAGE_NAME }}:sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  deploy:
    name: Notify Homelab Deploy
    runs-on: [self-hosted, homelab, linux, amd64]
    needs: [docker]
    if: always() && !cancelled()
    steps:
      - name: Trigger Watchtower update
        if: needs.docker.result == 'success'
        run: |
          echo "Image pushed: ${{ env.IMAGE_NAME }}:latest"
          echo "Watchtower will pick up the new image within 60s."
          echo "SHA: ${{ github.sha }}"

      - name: Notify failure
        if: needs.docker.result == 'failure'
        run: |
          curl -sf \
            -H "Title: DietDaemon Deploy Failed" \
            -H "Priority: high" \
            -H "Tags: warning" \
            -d "Main push deploy failed. SHA: ${{ github.sha }}" \
            "${{ secrets.NTFY_DEPLOY_URL }}" \
          || true
