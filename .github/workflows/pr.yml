name: PR Checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.26'
  NODE_VERSION: '22'

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: dorny/paths-filter@v4.0.2
        id: filter
        with:
          filters: |
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'migrations/**'
              - 'cmd/**'
              - 'internal/**'
              - 'core/**'
              - 'adapters/**'
              - 'fixtures/**'
            frontend:
              - 'web/**'
              - '!web/dist/**'

  go:
    name: Go (lint, test, build)
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.go == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Go
        uses: actions/setup-go@v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1 -timeout 120s

      - name: Vulnerability scan
        run: make govulncheck

      - name: Stub web/dist for go:embed
        run: |
          mkdir -p internal/web/dist
          if [ ! -f internal/web/dist/index.html ]; then
            echo '<html></html>' > internal/web/dist/index.html
          fi

      - name: Build (dietdaemon)
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o /dev/null ./cmd/dietdaemon

      - name: Build (tune)
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o /dev/null ./cmd/tune

  frontend:
    name: Frontend (lint, tsc, build)
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true'
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript check
        run: npx tsc -b --noEmit

      - name: Build
        run: npm run build
