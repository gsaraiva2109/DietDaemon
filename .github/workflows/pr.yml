name: PR Checks

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.26'
  NODE_VERSION: '22'

jobs:
  go:
    name: Go (lint, test, build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1 -timeout 120s

      - name: Stub web/dist for go:embed
        run: |
          mkdir -p internal/web/dist
          if [ ! -f internal/web/dist/index.html ]; then
            echo '<html></html>' > internal/web/dist/index.html
          fi

      - name: Build (dietdaemon)
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o /dev/null ./cmd/dietdaemon

      - name: Build (tune)
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o /dev/null ./cmd/tune

  frontend:
    name: Frontend (lint, tsc, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript check
        run: npx tsc -b --noEmit

      - name: Build
        run: npm run build
