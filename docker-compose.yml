services:
  dietdaemon:
    image: ghcr.io/gsaraiva2109/dietdaemon:latest
    container_name: dietdaemon
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/data

    # Dokploy Traefik routing — no host port needed.
    # dietdaemon listens on :8080 internally; Traefik routes
    # diet.gsaraiva.com.br → container:8080.
    expose:
      - 8080

    networks:
      - dokploy-network

    labels:
      - traefik.enable=true
      - traefik.http.routers.dietdaemon.rule=Host(`diet.gsaraiva.com.br`)
      - traefik.http.routers.dietdaemon.entrypoints=web
      - traefik.http.services.dietdaemon.loadbalancer.server.port=8080

