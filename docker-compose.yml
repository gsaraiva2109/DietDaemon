services:
  dietdaemon:
    # Image pulled from GHCR (built by CI). Remove the image line and
    # uncomment build: . for local development with `docker compose up --build`.
    # build: .
    image: ghcr.io/gsaraiva2109/dietdaemon:latest
    pull_policy: always
    container_name: dietdaemon
    restart: unless-stopped


    env_file:
      - .env
    # Named volume preserves DB across redeploys. Docker manages
    # permissions for the nonroot user (UID 65532) automatically.
    volumes:
      - dietdaemon_data:/data

    expose:
      - 8080

    # Soft memory cap — DietDaemon idles at 15-25 MB, 512 MB hard limit
    # catches leaks. Ollama runs in a separate container (see ai profile below).
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 64M


