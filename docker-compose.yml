services:
  dietdaemon:
    # Image pulled from GHCR (built by CI). Remove the image line and
    # uncomment build: . for local development with `docker compose up --build`.
    # build: .
    image: ghcr.io/gsaraiva2109/dietdaemon:v0.2.0-alpha.1 # x-release-please-version
    container_name: dietdaemon
    restart: unless-stopped

    env_file:
      - .env
    # Named volume preserves DB across redeploys. Docker manages
    # permissions for the nonroot user (UID 65532) automatically.
    volumes:
      - dietdaemon_data:/data

    expose:
      - 8080

    # Soft memory cap — DietDaemon idles at 15-25 MB, 512 MB hard limit
    # catches leaks. Ollama runs in a separate container (see ai profile below).
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 64M

  #  # Opt-in AI: docker compose --profile ai up
  ollama:
    image: ollama/ollama:latest
    container_name: dietdaemon-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ai

  # Opt-in Postgres: docker compose --profile postgres up
  postgres:
    image: postgres:16-alpine
    container_name: dietdaemon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dietdaemon}
      POSTGRES_USER: ${POSTGRES_USER:-dietdaemon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    profiles:
      - postgres

volumes:
  dietdaemon_data:
  ollama_data:
  postgres_data:
