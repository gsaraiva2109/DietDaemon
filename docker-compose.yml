services:
  dietdaemon:
    build: .
    image: ghcr.io/gsaraiva2109/dietdaemon:latest
    container_name: dietdaemon
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/data
    ports:
      - "8080:8080"

