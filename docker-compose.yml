services:
  dietdaemon:
    # Image pulled from GHCR (built by CI). Remove the image line and
    # uncomment build: . for local development with `docker compose up --build`.
    # build: .
    image: ghcr.io/gsaraiva2109/dietdaemon:latest
    container_name: dietdaemon
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/data
    # 3000 = Dokploy UI, 80/443 = Traefik. Don't collide.
    # When you have a domain, remove ports: and add Traefik labels instead.
    ports:
      - "4321:8080"

