services:
  dietdaemon:
    # Image pulled from GHCR (built by CI). Remove the image line and
    # uncomment build: . for local development with `docker compose up --build`.
    # build: .
    image: ghcr.io/gsaraiva2109/dietdaemon:latest
    container_name: dietdaemon
    restart: unless-stopped
    # Override nonroot (65532) — Swarm named volumes can block WAL creation
    # even with chmod 777. Root inside a distroless container has no shell
    # or package manager; minimal risk for a homelab deployment.
    user: "0:0"
    env_file:
      - .env
    # Named volume preserves DB across redeploys. Docker manages
    # permissions for the nonroot user (UID 65532) automatically.
    volumes:
      - dietdaemon_data:/data

    # Internal port only — Dokploy Traefik routes to this.
    # Add domain in Dokploy UI (Domains tab → container port 8080).
    expose:
      - 8080

    networks:
      - dokploy-network

